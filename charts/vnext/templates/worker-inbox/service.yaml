{{- $workerInbox := index .Values "worker-inbox" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vnext.fullname" . }}-worker-inbox
  labels:
    {{- include "vnext.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker-inbox
spec:
  type: {{ $workerInbox.service.type }}
  ports:
    - port: {{ $workerInbox.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "vnext.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: worker-inbox
