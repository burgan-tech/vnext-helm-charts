name: Build and Push Docker Image

on:
  push:
    branches: [master, main]
    paths: [charts/vnext/Dockerfile]
  pull_request:
    branches: [master, main]
    paths: [charts/vnext/Dockerfile]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vault-initializer

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump and get semantic version
        id: version
        run: |
          VERSION_FILE=charts/vnext/.version
          if [[ ! -f "$VERSION_FILE" ]]; then
            echo "1.0.0" > "$VERSION_FILE"
          fi
          VERSION=$(cat "$VERSION_FILE")
          # Only bump version on push (not on PR)
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            IFS='.' read -r major minor patch <<< "$VERSION"
            patch=$((patch+1))
            NEW_VERSION="$major.$minor.$patch"
            echo "$NEW_VERSION" > "$VERSION_FILE"
            VERSION="$NEW_VERSION"
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=ref,event=pr

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
