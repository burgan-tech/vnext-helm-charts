{{- if .Values.orchestrator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vnext.fullname" . }}-orchestrator
  labels:
    {{- include "vnext.componentLabels" (dict "context" . "component" "orchestrator") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "4"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  {{- if not .Values.orchestrator.autoscaling.enabled }}
  replicas: {{ .Values.orchestrator.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "vnext.componentSelectorLabels" (dict "context" . "component" "orchestrator") | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "vnext.daprAnnotations" (dict "dapr" .Values.orchestrator.dapr "enabled" .Values.global.dapr.enabled "component" "orchestrator" "appDomain" .Values.global.appDomain "httpMaxRequestSize" (coalesce .Values.orchestrator.dapr.httpMaxRequestSize .Values.global.dapr.httpMaxRequestSize)) | nindent 8 }}
        {{- with .Values.orchestrator.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        "checksum/config": {{ include (print $.Template.BasePath "/orchestrator/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "vnext.componentLabels" (dict "context" . "component" "orchestrator") | nindent 8 }}
        {{- with .Values.orchestrator.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with (coalesce .Values.orchestrator.imagePullSecrets .Values.global.imagePullSecrets) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vnext.serviceAccountName" . }}
      {{- with .Values.orchestrator.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}-orchestrator
          image: {{ include "vnext.image" (dict "image" .Values.orchestrator.image "defaultTag" .Chart.AppVersion) }}
          imagePullPolicy: {{ include "vnext.imagePullPolicy" (dict "component" .Values.orchestrator "global" .Values.global) }}
          envFrom:
            - configMapRef:
                name: {{ include "vnext.fullname" . }}-orchestrator-config
          {{- $securityContext := include "vnext.securityContext" (dict "component" .Values.orchestrator "global" .Values.global) }}
          {{- if $securityContext }}
          securityContext:
            {{- $securityContext | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.orchestrator.service.port }}
              protocol: TCP
          {{- if .Values.orchestrator.livenessProbe }}
          livenessProbe:
            {{- include "vnext.livenessProbe" (dict "probe" .Values.orchestrator.livenessProbe "global" .Values.global.probes.liveness) | nindent 12 }}
          {{- end }}
          {{- if .Values.orchestrator.readinessProbe }}
          readinessProbe:
            {{- include "vnext.readinessProbe" (dict "probe" .Values.orchestrator.readinessProbe "global" .Values.global.probes.readiness) | nindent 12 }}
          {{- end }}
          {{- $resources := include "vnext.resources" (dict "component" .Values.orchestrator "global" .Values.global) }}
          {{- if $resources }}
          resources:
            {{- $resources | nindent 12 }}
          {{- end }}
          {{- $pluginMount := include "vnext.plugins.volumeMount" . }}
          {{- if or .Values.orchestrator.volumeMounts $pluginMount }}
          volumeMounts:
            {{- with .Values.orchestrator.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- $pluginMount | nindent 12 }}
          {{- end }}
      {{- $pluginVol := include "vnext.plugins.volume" . }}
      {{- if or .Values.orchestrator.volumes $pluginVol }}
      volumes:
        {{- with .Values.orchestrator.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- $pluginVol | nindent 8 }}
      {{- end }}
      {{- with .Values.orchestrator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orchestrator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orchestrator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
