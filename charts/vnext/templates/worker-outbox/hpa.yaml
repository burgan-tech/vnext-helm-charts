{{- if (index .Values "worker-outbox" "autoscaling" "enabled") }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "vnext.fullname" . }}-worker-outbox
  labels:
    {{- include "vnext.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker-outbox
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "vnext.fullname" . }}-worker-outbox
  minReplicas: {{ index .Values "worker-outbox" "autoscaling" "minReplicas" }}
  maxReplicas: {{ index .Values "worker-outbox" "autoscaling" "maxReplicas" }}
  metrics:
    {{- if (index .Values "worker-outbox" "autoscaling" "targetCPUUtilizationPercentage") }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ index .Values "worker-outbox" "autoscaling" "targetCPUUtilizationPercentage" }}
    {{- end }}
    {{- if (index .Values "worker-outbox" "autoscaling" "targetMemoryUtilizationPercentage") }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ index .Values "worker-outbox" "autoscaling" "targetMemoryUtilizationPercentage" }}
    {{- end }}
{{- end }}
