{{ if and .Values.pgAdmin.enabled .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vnext.fullname" . }}-pgadmin4
  labels:
    {{- include "vnext.labels" . | nindent 4 }}
    app: pgadmin4
spec:
  type: {{ .Values.pgAdmin.service.type | default "ClusterIP" }}
  selector:
    {{- include "vnext.labels" . | nindent 4 }}
    app: pgadmin4
  ports:
    - name: http
      port: 80
      targetPort: http
{{- end -}}