{{- if and .Values.tls.enabled (not .Values.tls.certificateSecret) }}
{{- if .Values.tls.renewCertificates }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "redis-sentinel.fullname" . }}-tls-cert-renew
  labels:
    {{- include "redis-sentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: tls-cert-renewer
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "redis-sentinel.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tls-cert-renewer
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "redis-sentinel.serviceAccountName" . }}
      {{- if .Values.openshift.enabled }}
      {{- with .Values.securityContext.openshift }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- else }}
      {{- with .Values.securityContext.kubernetes }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      containers:
      - name: cert-renewer
        image: quay.io/openshift/origin-cli:latest
        {{- if .Values.openshift.enabled }}
        {{- with .Values.containerSecurityContext.openshift }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- else }}
        {{- with .Values.containerSecurityContext.kubernetes }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- end }}
        command:
          - sh
          - -c
          - |
            set -e
            
            echo "============================================"
            echo "Redis Sentinel TLS Certificate Renewal"
            echo "============================================"
            echo ""
            
            NAMESPACE="{{ .Release.Namespace }}"
            SECRET_NAME="{{ include "redis-sentinel.fullname" . }}-tls"
            
            # Check if secret exists
            if kubectl get secret $SECRET_NAME -n $NAMESPACE >/dev/null 2>&1; then
              echo "âś“ Existing TLS secret found: $SECRET_NAME"
              echo ""
              
              # Show current certificate expiry
              echo "Current certificate details:"
              kubectl get secret $SECRET_NAME -n $NAMESPACE -o jsonpath='{.data.tls\.crt}' | base64 -d | openssl x509 -noout -dates
              echo ""
              
              echo "Deleting old certificate..."
              kubectl delete secret $SECRET_NAME -n $NAMESPACE
              echo "âś“ Old certificate deleted"
              echo ""
            else
              echo "âš  No existing TLS secret found - will create new one"
              echo ""
            fi
            
            echo "Generating new TLS certificates..."
            echo ""
            
            CERT_DIR="/tmp/certs"
            mkdir -p $CERT_DIR
            cd $CERT_DIR
            
            # Certificate settings from values.yaml
            EXPIRY_DAYS={{ .Values.tls.certificate.expiryDays }}
            SUBJECT_COUNTRY="{{ .Values.tls.certificate.subject.country }}"
            SUBJECT_STATE="{{ .Values.tls.certificate.subject.state }}"
            SUBJECT_LOCALITY="{{ .Values.tls.certificate.subject.locality }}"
            SUBJECT_ORG="{{ .Values.tls.certificate.subject.organization }}"
            SUBJECT_OU="{{ .Values.tls.certificate.subject.organizationalUnit }}"
            SUBJECT_CN="{{ .Values.tls.certificate.subject.commonName }}"
            SERVICE_NAME="{{ include "redis-sentinel.fullname" . }}"
            
            echo "[1/5] Generating CA private key..."
            openssl genrsa -out ca.key 4096
            
            echo "[2/5] Generating CA certificate..."
            openssl req -x509 -new -nodes -sha256 \
              -key ca.key \
              -days $EXPIRY_DAYS \
              -subj "/C=$SUBJECT_COUNTRY/ST=$SUBJECT_STATE/L=$SUBJECT_LOCALITY/O=$SUBJECT_ORG/OU=$SUBJECT_OU/CN=$SUBJECT_CN-ca" \
              -out ca.crt
            
            echo "[3/5] Generating server private key..."
            openssl genrsa -out redis.key 4096
            
            echo "[4/5] Creating certificate signing request with SANs..."
            cat > openssl.cnf <<EOF
            [req]
            default_bits = 4096
            prompt = no
            default_md = sha256
            distinguished_name = dn
            req_extensions = v3_req

            [dn]
            C=$SUBJECT_COUNTRY
            ST=$SUBJECT_STATE
            L=$SUBJECT_LOCALITY
            O=$SUBJECT_ORG
            OU=$SUBJECT_OU
            CN=$SUBJECT_CN

            [v3_req]
            subjectAltName = @alt_names

            [alt_names]
            DNS.1 = localhost
            DNS.2 = *.${SERVICE_NAME}
            DNS.3 = *.${SERVICE_NAME}.${NAMESPACE}
            DNS.4 = *.${SERVICE_NAME}.${NAMESPACE}.svc
            DNS.5 = *.${SERVICE_NAME}.${NAMESPACE}.svc.cluster.local
            DNS.6 = *.${SERVICE_NAME}-headless
            DNS.7 = *.${SERVICE_NAME}-headless.${NAMESPACE}
            DNS.8 = *.${SERVICE_NAME}-headless.${NAMESPACE}.svc
            DNS.9 = *.${SERVICE_NAME}-headless.${NAMESPACE}.svc.cluster.local
            {{- range $i, $san := .Values.tls.certificate.additionalSANs }}
            DNS.{{ add $i 10 }} = {{ $san }}
            {{- end }}
            IP.1 = 127.0.0.1
            EOF
            
            openssl req -new -key redis.key -out redis.csr -config openssl.cnf
            
            echo "[5/5] Signing server certificate..."
            openssl x509 -req -in redis.csr \
              -CA ca.crt -CAkey ca.key -CAcreateserial \
              -out redis.crt \
              -days $EXPIRY_DAYS \
              -sha256 \
              -extensions v3_req \
              -extfile openssl.cnf
            
            echo ""
            echo "âś“ Certificate generation completed!"
            echo ""
            echo "New certificate details:"
            openssl x509 -in redis.crt -noout -dates
            echo ""
            
            # Create Kubernetes secret with certificates and Helm labels
            echo "Creating Kubernetes secret with Helm ownership labels..."
            kubectl create secret generic $SECRET_NAME \
              --from-file=ca.crt=ca.crt \
              --from-file=tls.crt=redis.crt \
              --from-file=tls.key=redis.key \
              --namespace=$NAMESPACE \
              --dry-run=client -o yaml | \
            kubectl label --local -f - \
              app.kubernetes.io/managed-by=Helm \
              app.kubernetes.io/instance={{ .Release.Name }} \
              app.kubernetes.io/name={{ include "redis-sentinel.name" . }} \
              helm.sh/chart={{ include "redis-sentinel.chart" . }} \
              -o yaml | \
            kubectl annotate --local -f - \
              meta.helm.sh/release-name={{ .Release.Name }} \
              meta.helm.sh/release-namespace={{ .Release.Namespace }} \
              -o yaml | \
            kubectl apply -f -
            
            echo ""
            echo "============================================"
            echo "âś“ TLS Certificate Renewal Complete!"
            echo "============================================"
            echo "Secret: $SECRET_NAME"
            echo "Validity: $EXPIRY_DAYS days"
            echo ""
            echo "âš  IMPORTANT: Redis/Sentinel pods need to be restarted to use new certificates"
            echo "   Run: kubectl rollout restart statefulset {{ include "redis-sentinel.fullname" . }} -n $NAMESPACE"
{{- end }}
{{- end }}

