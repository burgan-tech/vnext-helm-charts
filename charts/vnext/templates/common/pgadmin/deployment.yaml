{{ if and .Values.pgAdmin.enabled .Values.postgres.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vnext.fullname" . }}-pgadmin4
  labels:
    {{- include "vnext.labels" . | nindent 4 }}
    app: pgadmin4
spec:
  replicas: {{ .Values.pgAdmin.replicaCount }}
  selector:
    matchLabels:
      {{- include "vnext.labels" . | nindent 6 }}
      app: pgadmin4
  template:
    metadata:
      labels:
        {{- include "vnext.labels" . | nindent 8 }}
        app: pgadmin4
    spec:
      containers:
        - name: {{ include "vnext.fullname" . }}-pgadmin4
          image: {{ .Values.pgAdmin.image.registry }}/{{ .Values.pgAdmin.image.repository }}:{{ .Values.pgAdmin.image.tag }}
          imagePullPolicy: {{ .Values.pgAdmin.image.imagePullPolicy }}
          ports:
            - containerPort: 80
              name: http
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ include "vnext.fullname" . }}-pgadmin-credentials
                  key: PGADMIN_DEFAULT_EMAIL
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vnext.fullname" . }}-pgadmin-credentials
                  key: PGADMIN_DEFAULT_PASSWORD
            - name: PGADMIN_LISTEN_PORT
              value: "80"
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgadmin
            - name: servers
              mountPath: /pgadmin4/servers.json
              subPath: servers.json
              readOnly: true
          livenessProbe:
            httpGet:
              path: /misc/ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /misc/ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            runAsUser: 5050
            runAsGroup: 5050
      securityContext:
        fsGroup: 5050
      serviceAccountName: {{ include "vnext.fullname" . }}-pgadmin-sa
      volumes:
        {{- if .Values.pgAdmin.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "vnext.fullname" . }}-pgadmin-data
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
        - name: servers
          configMap:
            name: {{ include "vnext.fullname" . }}-pgadmin-servers
            items:
              - key: servers.json
                path: servers.json
{{- end -}}
