{{- if .Values.postgres.enabled }}
{{- if not .Values.postgres.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vnext.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vnext.labels" . | nindent 4 }}
    app: postgres
type: Opaque
data:
  {{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (include "vnext.fullname" .)) }}
  {{- $existingPostgresPassword := "" }}
  {{- if and $existingSecret $existingSecret.data }}
    {{- $existingPostgresPassword = index $existingSecret.data "postgres-password" }}
  {{- end }}
  {{- $postgresPassword := $existingPostgresPassword | default (.Values.postgres.auth.password | default (randAlphaNum 32) | b64enc) }}
  {{- $host := printf "%s-postgres.%s.svc" (include "vnext.fullname" .) .Release.Namespace }}
  {{- $port := .Values.postgres.service.port | toString }}
  {{- $username := .Values.postgres.auth.username | default "postgres" }}
  {{- $database := .Values.postgres.auth.database | default "vNext_WorkflowDb" }}
  postgres-password: {{ $postgresPassword | quote }}
  host: {{ $host | b64enc | quote }}
  port: {{ $port | b64enc | quote }}
  username: {{ $username | b64enc | quote }}
  database: {{ $database | b64enc | quote }}
  uri: {{ printf "postgresql://%s:%s@%s:%s/%s" $username ($postgresPassword | b64dec) $host $port $database | b64enc | quote }}
{{- end }}
{{- end }}