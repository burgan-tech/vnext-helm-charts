{{- if .Values.mockoon.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vnext.fullname" . }}-mockoon
  labels:
    {{- include "vnext.labels" . | nindent 4 }}
    app: mockoon
spec:
  type: {{ .Values.mockoon.service.type }}
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
      name: http
  selector:
    {{- include "vnext.labels" . | nindent 4 }}
    app: mockoon
{{- end -}}