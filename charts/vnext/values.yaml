# ==============================================================================
# DEPENDENCY CHARTS CONFIGURATION
# ==============================================================================

# HashiCorp Vault configuration
vault:
  enabled: true
  server:
    secretShares: 5
    secretThreshold: 3
  injector:
    enabled: true
  global:
    openshift: false


# Dapr (Distributed Application Runtime)
dapr:
  enabled: true
  global:
    logAsJson: true
    ha:
      enabled: false
      replicaCount: "3"
      disruption:
        minimumAvailable: ""
        maximumUnavailable: "25%"
    prometheus:
      enabled: true
      port: "9090"
    mtls:
      enabled: true
      workloadCertTTL: 24h
      allowedClockSkew: 15m
    daprControlPlaneOs: linux
  
  dapr_operator:
    watchInterval: "3m"
  
  runAsNonRoot: true
  
  dapr_scheduler:
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: dapr-scheduler
              topologyKey: topology.kubernetes.io/zone
  
  dapr_placement:
    runAsNonRoot: true
    enableMetrics: true
    extraArgs:
      - "--replicationFactor=100"
  
  dapr_sentry:
    tls:
      root:
        ttl: 8760h
      issuer:
        ttl: 2160h

# Redis Sentinel configuration
redis-sentinel:
  enabled: true
  replicaCount: 1
  openshift:
    enabled: false
  
  redis:
    password: ""
    extraConfig: |
      # Performance optimizations
      tcp-keepalive 60
      timeout 0
      # Disable persistence for better performance (adjust for production)
      appendonly no
      save ""
      stop-writes-on-bgsave-error no
      # Replication optimizations
      repl-diskless-sync yes
      appendfsync no
      repl-diskless-load on-empty-db
    
    persistence:
      enabled: true
      size: 8Gi
      storageClass: ""
      accessMode: ReadWriteOnce

      maxMemory: "2560mb"
      maxMemoryPolicy: "noeviction"
      appendonly: false
  
  securityContext:
    runAsNonRoot: true
    # Uncomment below for non-OpenShift environments if needed:
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
  
  auth:
    existingSecret: ""
    redis:
      passwordKey: "redis-password"
    sentinel:
      passwordKey: "sentinel-password"
  
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: redis-sentinel
  
  resources:
    redis:
      limits:
        cpu: 1000m
        memory: 3Gi
      requests:
        cpu: 100m
        memory: 256Mi
    sentinel:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi
  
  metrics:
    enabled: true

# ==============================================================================
# OPTIONAL DEVELOPMENT TOOLS
# These tools are useful for development and debugging but should be disabled
# in production environments for security and resource optimization.
# ==============================================================================

# RedisInsight - Redis GUI tool
# Web-based GUI for Redis management and monitoring
redisInsight:
  # Enable RedisInsight (recommended: true for dev, false for production)
  enabled: false
  replicaCount: 1
  image:
    registry: docker.io
    repository: redis/redisinsight
    tag: "latest"
    imagePullPolicy: IfNotPresent
  service:
    type: ClusterIP

# pgAdmin - PostgreSQL GUI tool
# Web-based administration tool for PostgreSQL
pgAdmin:
  # Enable pgAdmin (recommended: true for dev, false for production)
  enabled: false
  replicaCount: 1
  image:
    registry: docker.io
    repository: dpage/pgadmin4
    tag: "latest"
    imagePullPolicy: IfNotPresent
    
  auth:
    email: "admin@example.com"
    password: "admin"
  
  persistence:
    enabled: true
    storageClass: ""
    size: 5Gi
  service:
    type: ClusterIP


# Mockoon - API Mocking tool
# Lightweight API mocking server for development and testing
mockoon:
  # Enable Mockoon (recommended: true for dev, false for production)
  enabled: false
  replicaCount: 1
  args: ["--data", "/data/migration-api.json", "--port", "3001", "--hostname", "0.0.0.0"]
  
  image:
    registry: docker.io
    repository: mockoon/cli
    tag: "latest"
    imagePullPolicy: IfNotPresent
  
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 128Mi
  
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 30
    failureThreshold: 3
    timeoutSeconds: 10
  
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 30
    failureThreshold: 3
    timeoutSeconds: 10
  
  service:
    type: ClusterIP
    port: 3001

# OpenObserve - Observability platform
# Open-source alternative to Datadog, New Relic, etc.
# Note: For production, consider using dedicated observability solutions
openobserve:
  # Enable OpenObserve (recommended: true for dev, false for production)
  enabled: false
  replicaCount: 1
  
  image:
    registry: public.ecr.aws
    repository: zinclabs/openobserve
    tag: "latest"
    imagePullPolicy: IfNotPresent
  
  auth:
    username: "admin@example.com"
    password: "admin"
  service:
    type: ClusterIP
# OpenTelemetry Collector
opentelemetry-collector:
  enabled: true
  mode: deployment
  
  image:
    repository: "ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s"
    pullPolicy: IfNotPresent
    tag: ""
  
  imagePullSecrets: []
  
  configMap:
    create: false
    existingName: "opentelemetry-collector-config"

# Prometheus Stack
kube-prometheus-stack:
  enabled: true
  alertmanager:
    enabled: false
  nodeExporter:
    enabled: false
  prometheus:
    prometheusSpec:
      additionalScrapeConfigsSecret:
        enabled: true
        name: "vnext-prometheus-scrape-config"
        key: "additional-scrape-configs.yaml"
  grafana:
    defaultDashboardsEnabled: false  # Disable default operator dashboards
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
        folder: /tmp/dashboards/Vnext
        provider:
          foldersFromFilesStructure: true

# Dapr Dashboard
dapr-dashboard:
  enabled: true

# ==============================================================================
# POSTGRESQL DATABASE CONFIGURATION
# ==============================================================================

postgres:
  enabled: true
  replicaCount: 1
  
  image:
    repository: docker.io/library/postgres
    tag: "18.0@sha256:073e7c8b84e2197f94c8083634640ab37105effe1bc853ca4d5fbece3219b0e8"
    imagePullPolicy: Always
  
  auth:
    existingSecret: ""
    secretKeys:
      passwordKey: "postgres-password"
    username: "admin"
    password: "admin"
    database: "vNext_WorkflowDb"
  
  podLabels: {}
  
  serviceAccount:
    autoMountServiceAccountToken: false
  
  service:
    port: 5432
    targetPort: 5432
    type: ClusterIP
    loadBalancerIP: ""
    externalTrafficPolicy: ""
  
  config:
    existingConfigmap: ""
    # PostgreSQL performance tuning
    postgresqlMaxConnections: 2048
    postgresqlSharedBuffers: 128MB
    postgresqlEffectiveCacheSize: 4GB
    postgresqlWorkMem: 4MB
    postgresqlMaintenanceWorkMem: 64MB
