{{- if .Values.sentinelExporter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "redis-sentinel.fullname" . }}-sentinel-exporter
  labels:
    {{- include "redis-sentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: sentinel-exporter
spec:
  replicas: {{ .Values.sentinelExporter.replicas }}
  selector:
    matchLabels:
      {{- include "redis-sentinel.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: sentinel-exporter
  template:
    metadata:
      labels:
        {{- include "redis-sentinel.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: sentinel-exporter
      {{- if .Values.sentinelExporter.podAnnotations.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.sentinelExporter.port | quote }}
        prometheus.io/path: "/metrics"
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "redis-sentinel.serviceAccountName" . }}
      {{- if .Values.openshift.enabled }}
      {{- with .Values.securityContext.openshift }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- else }}
      {{- with .Values.securityContext.kubernetes }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      containers:
      - name: redis-exporter
        image: "{{ .Values.sentinelExporter.image.repository }}:{{ .Values.sentinelExporter.image.tag }}"
        imagePullPolicy: {{ .Values.sentinelExporter.image.pullPolicy }}
        {{- if .Values.openshift.enabled }}
        {{- with .Values.containerSecurityContext.openshift }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- else }}
        {{- with .Values.containerSecurityContext.kubernetes }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- end }}
        ports:
        - name: exporter-port
          containerPort: {{ .Values.sentinelExporter.port }}
          protocol: TCP
        env:
        # Point to Sentinel service (not individual pods)
        - name: REDIS_ADDR
          value: "redis://{{ include "redis-sentinel.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.sentinel.port }}"
        # Tell exporter this is Sentinel
        - name: REDIS_EXPORTER_IS_SENTINEL
          value: "true"
        # Master name to monitor
        - name: REDIS_SENTINEL_MASTER_NAME
          value: "mymaster"
        # Sentinel password for authentication
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "redis-sentinel.secretName" . }}
              key: {{ .Values.auth.sentinel.passwordKey | default "sentinel-password" }}
        livenessProbe:
          httpGet:
            path: /
            port: exporter-port
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: exporter-port
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.sentinelExporter.resources | nindent 10 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

