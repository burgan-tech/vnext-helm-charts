{{- $workerInbox := index .Values "worker-inbox" }}
{{- if $workerInbox.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "vnext.fullname" . }}-worker-inbox
  labels:
    {{- include "vnext.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker-inbox
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "vnext.fullname" . }}-worker-inbox
  minReplicas: {{ $workerInbox.autoscaling.minReplicas }}
  maxReplicas: {{ $workerInbox.autoscaling.maxReplicas }}
  metrics:
    {{- if $workerInbox.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $workerInbox.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if $workerInbox.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $workerInbox.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
