{{- if .Values.execution.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vnext.fullname" . }}-execution
  labels:
    {{- include "vnext.componentLabels" (dict "context" . "component" "execution") | nindent 4 }}
  {{- if .Values.dapr.enabled }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "4"
    "helm.sh/hook-delete-policy": before-hook-creation
  {{- end }}
spec:
  {{- if not .Values.execution.autoscaling.enabled }}
  replicas: {{ .Values.execution.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "vnext.componentSelectorLabels" (dict "context" . "component" "execution") | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "vnext.daprAnnotations" (dict "dapr" .Values.execution.dapr "enabled" .Values.global.dapr.enabled "component" "execution" "appDomain" .Values.global.appDomain) | nindent 8 }}
        {{- with .Values.execution.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        "helm.sh/release-revision": "{{ .Release.Revision }}"
      labels:
        {{- include "vnext.componentLabels" (dict "context" . "component" "execution") | nindent 8 }}
        {{- with .Values.execution.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with (coalesce .Values.execution.imagePullSecrets .Values.global.imagePullSecrets) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vnext.serviceAccountName" . }}
      {{- with .Values.execution.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}-execution
          image: {{ include "vnext.image" (dict "image" .Values.execution.image "defaultTag" .Chart.AppVersion) }}
          imagePullPolicy: {{ include "vnext.imagePullPolicy" (dict "component" .Values.execution "global" .Values.global) }}
          envFrom:
            - configMapRef:
                name: {{ include "vnext.fullname" . }}-execution-config
          {{- $securityContext := include "vnext.securityContext" (dict "component" .Values.execution "global" .Values.global) }}
          {{- if $securityContext }}
          securityContext:
            {{- $securityContext | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.execution.service.port }}
              protocol: TCP
          {{- if .Values.execution.livenessProbe }}
          livenessProbe:
            {{- include "vnext.livenessProbe" (dict "probe" .Values.execution.livenessProbe "global" .Values.global.probes.liveness) | nindent 12 }}
          {{- end }}
          {{- if .Values.execution.readinessProbe }}
          readinessProbe:
            {{- include "vnext.readinessProbe" (dict "probe" .Values.execution.readinessProbe "global" .Values.global.probes.readiness) | nindent 12 }}
          {{- end }}
          {{- $resources := include "vnext.resources" (dict "component" .Values.execution "global" .Values.global) }}
          {{- if $resources }}
          resources:
            {{- $resources | nindent 12 }}
          {{- end }}
          {{- with .Values.execution.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.execution.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.execution.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.execution.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.execution.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
