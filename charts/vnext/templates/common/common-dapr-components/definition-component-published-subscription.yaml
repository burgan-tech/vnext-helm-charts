apiVersion: dapr.io/v1alpha1
kind: Subscription
metadata:
  name: {{ include "vnext.fullname" . }}-definition-component-published-subscription
  annotations:
  "helm.sh/hook": post-install,post-upgrade
  "helm.sh/hook-weight": "3"
  "helm.sh/hook-delete-policy": before-hook-creation
spec:
  topic: definition.component.published
  route: /api/v1/utilities/cache/component-published
  pubsubname: {{ include "vnext.fullname" . }}-pubsub-broadcast
scopes:
- {{ .Values.orchestrator.dapr.appId | default (printf "vnext-%s-app" .Values.global.appDomain) | quote }}
- {{ (index .Values "worker-inbox").dapr.appId | default (printf "vnext-%s-worker-inbox-app" .Values.global.appDomain) | quote }}
