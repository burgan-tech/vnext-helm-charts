# ==============================================================================
# GLOBAL CONFIGURATION
# Configuration shared across all components in the vNext platform
# ==============================================================================

global:
  # Application domain identifier - used for naming Dapr apps and service discovery
  # This value is required and must be unique per app
  # Example: "banking", "contract", "core"
  appDomain: "core"

  # External Vault configuration
  # Use this when connecting to an existing HashiCorp Vault instance
  externalVault: 
    # Set to true to use an external Vault instead of the bundled one
    enabled: false
    # External Vault server address (e.g., "https://vault.example.com:8200")
    address: ""
    # Secret engine name/path in Vault. If empty, will be auto-generated
    # Format: vnext-<appDomain>-engine
    secretEngineName: ""
    vaultToken: "enter-vault-token"

  # Default image pull policy for all components
  # Options: Always, IfNotPresent, Never
  imagePullPolicy: IfNotPresent
  
  # Image pull secrets for private container registries
  # Example:
  #   imagePullSecrets:
  #     - name: regcred
  #     - name: another-secret
  imagePullSecrets: []
  
  # -----------------------------------------------------------------------------
  # .NET Runtime Configuration
  # Common environment variables applied to all .NET services
  # -----------------------------------------------------------------------------
  dotnetEnv:
    # Disable NuGet package signature verification for faster builds
    DOTNET_NUGET_SIGNATURE_VERIFICATION: "false"
    # Use polling for file system changes (required in some container environments)
    DOTNET_USE_POLLING_FILE_WATCHER: "1"
    # Indicate running in containerized environment
    DOTNET_RUNNING_IN_CONTAINER: "true"
    # Use invariant globalization (reduces image size and improves performance)
    DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
    # ASP.NET Core environment (Development, Staging, Production)
    ASPNETCORE_ENVIRONMENT: "Development"

  # -----------------------------------------------------------------------------
  # Application-level Environment Variables
  # Global defaults for all vNext services
  # -----------------------------------------------------------------------------
  appEnvConfig: {}
  
  # -----------------------------------------------------------------------------
  # Dapr (Distributed Application Runtime) Configuration
  # Global settings for Dapr service mesh integration
  # -----------------------------------------------------------------------------
  dapr:
    # Enable or disable Dapr sidecar injection globally
    enabled: true
    # Communication protocol between app and Dapr sidecar (http or grpc)
    protocol: "http"
    # Dapr placement service endpoint for actor placement
    placementHost: "dapr-placement:50005"
    # HTTP port for Dapr sidecar API
    httpPort: "42110"
    # gRPC port for Dapr sidecar API
    grpcPort: "42111"
  
  # -----------------------------------------------------------------------------
  # OpenTelemetry Configuration
  # Global settings for distributed tracing and observability
  # -----------------------------------------------------------------------------
  telemetry:
    # Enable or disable telemetry collection globally
    enabled: true
    # External OpenTelemetry collector configuration
    external:
      # Set to true to use an external collector instead of the bundled one
      enabled: false
      # External collector endpoint (e.g., "http://otel-collector.observability.svc:4317")
      endpoint: ""
    # Protocol for telemetry export (grpc or http/protobuf)
    protocol: "grpc"

  
  # -----------------------------------------------------------------------------
  # Database Configuration
  # Global settings for database connectivity
  # -----------------------------------------------------------------------------
  database:
    # PostgreSQL connection string
    # Format: Host=<host>;Port=<port>;Database=<db>;Username=<user>;Password=<pass>;
    # This is used when Vault is disabled. When Vault is enabled, connection details
    # are retrieved from Vault secrets.
    connectionString: "Host=vnext-postgres-headless;Port=5432;Database=vNext_WorkflowDb;Username=vnext;Password=changeme;"
    
    # ClickHouse configuration for analytics and time-series data
    # Note: ClickHouse deployment is not included in this chart.
    # If you want to use ClickHouse, deploy it separately and configure the connection here.
    clickhouse:
      # Enable ClickHouse integration for workflow analytics
      # Set to false if not using ClickHouse
      enabled: false
      # ClickHouse connection string (required only if enabled is true)
      # Example: "Host=clickhouse.analytics.svc;Port=8123;Database=workflow_analytics;Username=default;Password=your-password;"
      connectionString: ""
  
  # -----------------------------------------------------------------------------
  # Redis Configuration
  # Settings for Redis/cache connectivity
  # -----------------------------------------------------------------------------
  # External Redis endpoint configuration
  # Use this when connecting to an existing Redis instance or managed service
  # If empty, will use the bundled Redis Sentinel cluster
  # Example: "redis.example.com:6379" or "redis-cluster.svc:6379"
  externalRedis:
      endpoint: ""
  
  # -----------------------------------------------------------------------------
  # Resource Defaults
  # Default resource limits and requests applied to all services
  # Individual services can override these values
  # -----------------------------------------------------------------------------
  resources:
    default:
      # Maximum resources a container can use
      limits:
        cpu: 1      # 1 CPU core
        memory: 2Gi     # 1 gigabyte of RAM
      # Guaranteed resources for a container
      requests:
        cpu: 100m       # 0.1 CPU core
        memory: 256Mi   # 256 megabytes of RAM
  
  # -----------------------------------------------------------------------------
  # Health Probe Defaults
  # Default configuration for Kubernetes liveness and readiness probes
  # Individual services can override these values
  # -----------------------------------------------------------------------------
  probes:
    # Liveness probe determines when to restart a container
    liveness:
      # Number of seconds to wait before performing the first probe
      initialDelaySeconds: 35
      # How often to perform the probe (in seconds)
      periodSeconds: 10
      # Number of consecutive failures before restarting the container
      failureThreshold: 5
      # Number of seconds before timing out
      timeoutSeconds: 30
    
    # Readiness probe determines when a container is ready to accept traffic
    readiness:
      # Number of seconds to wait before performing the first probe
      initialDelaySeconds: 35
      # How often to perform the probe (in seconds)
      periodSeconds: 10
      # Number of consecutive failures before marking as not ready
      failureThreshold: 5
      # Number of consecutive successes before marking as ready
      successThreshold: 2
      # Number of seconds before timing out
      timeoutSeconds: 30
  
  # -----------------------------------------------------------------------------
  # Security Context
  # Default security settings applied to all containers
  # Individual services can override these values
  # -----------------------------------------------------------------------------
  securityContext:
    # Drop all Linux capabilities for enhanced security
    capabilities:
      drop:
      - ALL
    # Mount root filesystem as read-only for security
    readOnlyRootFilesystem: true
    # Run container as non-root user (may need adjustment for some images)
    runAsNonRoot: false

# ==============================================================================
# SERVICE ACCOUNT CONFIGURATION
# Kubernetes service account for pod authentication
# More information: https://kubernetes.io/docs/concepts/security/service-accounts/
# ==============================================================================
serviceAccount:
  # Create a new service account (set to false to use an existing one)
  create: true
  # Automatically mount service account token in pods
  automount: true
  # Annotations to add to the service account (useful for IRSA, Workload Identity, etc.)
  # Example for AWS IAM Role:
  #   annotations:
  #     eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/vnext-role
  annotations: {}
  # Name of the service account to use (if empty, will be generated)
  name: ""

# ==============================================================================
# ORCHESTRATOR SERVICE CONFIGURATION
# Main workflow orchestration engine that manages workflow execution
# ==============================================================================
orchestrator:
  # Enable or disable the orchestrator service
  enabled: true
  
  # Number of replicas to deploy
  # For production, consider using 3+ replicas with autoscaling
  replicaCount: 1
  
  # Container image configuration
  image:
    # Image repository path
    repository: ghcr.io/burgan-tech/vnext/orchestrator
    # Image tag (if empty, defaults to chart appVersion)
    tag: ""
    # Image pull policy (if empty, uses global.imagePullPolicy)
    # Options: Always, IfNotPresent, Never
    pullPolicy: ""
  
  # Init job configuration
  # Runs database migrations and initialization before the main service starts
  initializer:
    # Enable or disable the initialization job
    enabled: true
    # Init job container image
    image:
      repository: ghcr.io/burgan-tech/vnext/init
      tag: ""
    service:
      type: ClusterIP
      port: 3000
    # Environment variables for the init job
    envConfig:
      # vNext core runtime version to initialize
      VNEXT_COMPONENT_VERSION: "0.0.18"
      NPM_REGISTRY: "https://registry.npmjs.org/"
    ingress:
      enabled: false
      className: ""
      annotations: {}
      hosts:
        - host: initializer.example.local
          paths:
            - path: /
              pathType: Prefix
      tls: []
  
  # Override global image pull secrets for this service if needed
  # If empty, uses global.imagePullSecrets
  imagePullSecrets: []
  
  # Dapr sidecar configuration for this service
  dapr:
    # Enable Dapr sidecar injection for this service
    enabled: true
    # Dapr application ID (if empty, auto-generated as: vnext-<domain>-app)
    # Used for service discovery and pub/sub
    appId: ""
    # Port that the application listens on
    appPort: "5000"
  
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  
  # Use global securityContext, override if needed
  securityContext: {}
  
  service:
    type: ClusterIP
    port: 5000
  
  # Ingress configuration for external access
  ingress:
    # Enable ingress for external access
    enabled: false
    # Ingress class name (e.g., nginx, traefik, alb)
    className: ""
    # Ingress annotations
    # Example for nginx:
    #   annotations:
    #     nginx.ingress.kubernetes.io/rewrite-target: /
    #     cert-manager.io/cluster-issuer: letsencrypt-prod
    annotations: {}
    # Ingress hosts configuration
    hosts:
      - host: chart-example.local
        paths:
          - path: /
            pathType: ImplementationSpecific
    # TLS configuration
    # Example:
    #   tls:
    #     - secretName: orchestrator-tls
    #       hosts:
    #         - orchestrator.example.com
    tls: []
  
  # Uses global.resources.default if empty
  resources: {}
  
  # Health check probes (uses global.probes if not specified)
  livenessProbe:
    httpGet:
      path: /live
      port: http
  
  readinessProbe:
    httpGet:
      path: /ready
      port: http
  
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  
  volumes: []
  volumeMounts: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  
  # Additional custom environment variables
  # These will be added to the service's ConfigMap
  # Example:
  #   extraEnvConfig:
  #     MY_CUSTOM_VAR: "value"
  #     ANOTHER_VAR: "another-value"
  extraEnvConfig: {}
  
  # Application-specific configuration
  # These environment variables configure the vNext application behavior
  appEnvConfig:
    # Enable Vault integration for secrets management
    # When enabled, database and Redis credentials are fetched from Vault
    # When disabled, credentials are read from ConfigMap (not recommended for production)
    Vault__Enabled: "true"
    # Default logging level (Trace, Debug, Information, Warning, Error, Critical)
    Logging__LogLevel__Default: "Debug"
    # SignalR hub configuration for real-time communication
    SignalR__AppId: "http://localhost:6203"

# ==============================================================================
# EXECUTION SERVICE CONFIGURATION
# Workflow execution engine that processes workflow tasks
# ==============================================================================
execution:
  # Enable or disable the execution service
  enabled: true
  
  # Number of replicas to deploy
  # For production, consider using multiple replicas with autoscaling
  replicaCount: 1

  notificationBinding:
    # Default url: "http://mockoon:3001/api/notification/send"
    url: ""
    
  image:
    repository: ghcr.io/burgan-tech/vnext/execution
    tag: ""  # Defaults to chart appVersion
    pullPolicy: ""  # Uses global.imagePullPolicy if empty
  
  # Override global settings if needed
  imagePullSecrets: []
  
  # Dapr specific annotations
  dapr:
    enabled: true
    # appId doesn't exist in the values.yaml file, it is generated by the chart
    appId: ""
    appPort: "5000"
  
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  
  # Use global securityContext, override if needed
  securityContext: {}
  
  service:
    type: ClusterIP
    port: 5000
  
  # Uses global.resources.default if empty
  resources: {}
  
  # Health check probes (uses global.probes if not specified)
  livenessProbe:
    httpGet:
      path: /live
      port: http
  
  readinessProbe:
    httpGet:
      path: /ready
      port: http
  
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  
  volumes: []
  volumeMounts: []
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Additional environment variables for the execution service
  extraEnvConfig: {}
  
  # Application configuration
  appEnvConfig:
    # If Vault is enabled, the database and redis configurations won't be created in the configmap.
    Vault__Enabled: "true"
    Logging__LogLevel__Default: "Debug"

